name: Repair Battlefield Deployment

on:
  push:
    paths:
      - .github/workflows/repair-battlefield-deploy.yml

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: battlefield-repair
  cancel-in-progress: false

jobs:
  repair-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Repair battlefield patch source
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('scripts/patch_point8_battlefield.py')
          text = path.read_text(encoding='utf-8')

          function_anchor = '\ndef patch_navigation(text: str) -> str:\n'
          if 'def shift_later_sections(text: str) -> str:' not in text:
              shift_function = r'''
def shift_later_sections(text: str) -> str:
    """Shift every pre-existing top-level Point 9+ by one before inserting the new Point 8."""
    section_pattern = re.compile(
        r'<section\b(?P<attrs>[^>]*)>(?P<body>.*?)</section>',
        re.I | re.S,
    )
    shifted: list[tuple[int, int]] = []

    def repl(match: re.Match[str]) -> str:
        body = match.group("body")
        heading = re.search(r'<h2\b[^>]*>\s*(\d+)\.', body, re.I)
        if not heading:
            return match.group(0)

        old = int(heading.group(1))
        if old < 9:
            return match.group(0)
        new = old + 1

        body, count = re.subn(
            rf'(<h2\b[^>]*>\s*){old}\.',
            rf'\g<1>{new}.',
            body,
            count=1,
            flags=re.I,
        )
        if count != 1:
            raise RuntimeError(f"Não foi possível deslocar o cabeçalho do Ponto {old}.")

        body = re.sub(
            rf'(<h3\b[^>]*>\s*){old}\.(\d+)',
            rf'\g<1>{new}.\2',
            body,
            flags=re.I,
        )
        body = body.replace(
            f'O Ponto {old} está estruturalmente definido.',
            f'O Ponto {new} está estruturalmente definido.',
        )
        shifted.append((old, new))
        return f'<section{match.group("attrs")}>{body}</section>'

    result = section_pattern.sub(repl, text)
    if shifted:
        print("Shifted later GDD points:", ", ".join(f"{old}→{new}" for old, new in shifted))
    return result
'''
              if function_anchor not in text:
                  raise RuntimeError('Âncora de patch_navigation não encontrada.')
              text = text.replace(function_anchor, '\n' + shift_function + function_anchor, 1)

          nav_anchor = '    inserted = 0\n\n    def repl(match: re.Match[str]) -> str:\n'
          if 'def shift_existing_clickable(match: re.Match[str]) -> str:' not in text:
              nav_patch = r'''    def shift_existing_clickable(match: re.Match[str]) -> str:
        point = top_level_point(match.group("body"))
        if point is None or point < 9:
            return match.group(0)
        attrs = match.group("attrs")
        if not re.search(r"\b(?:href|data-target|data-section)\s*=", attrs, re.I):
            return match.group(0)
        body = renumber_nav_body(match.group("body"), point, point + 1)
        return f'<{match.group("tag")}{attrs}>{body}</{match.group("tag")}>'

    text = clickable.sub(shift_existing_clickable, text)
    inserted = 0

    def repl(match: re.Match[str]) -> str:
'''
              if nav_anchor not in text:
                  raise RuntimeError('Âncora da navegação não encontrada.')
              text = text.replace(nav_anchor, nav_patch, 1)

          main_anchor = '    pve_pattern = re.compile(r\'<section id="pve-training">.*?</section>\', re.S)\n'
          if '    gdd = shift_later_sections(gdd)\n\n    pve_pattern' not in text:
              if main_anchor not in text:
                  raise RuntimeError('Âncora de renumeração do PvE não encontrada.')
              text = text.replace(main_anchor, '    gdd = shift_later_sections(gdd)\n\n' + main_anchor, 1)

          text = text.replace(
              '    assert gdd.count("<h2>8.") == 1\n    assert gdd.count("<h2>9.") == 1\n',
              '',
              1,
          )

          validation_anchor = '    assert pve and pve.group(0).count("<h3>9.") == 20\n'
          validation_patch = validation_anchor + (
              '    assert re.search(r\'<h2>\\s*8\\. Campo de Batalha, Formação e Posicionamento</h2>\', battlefield.group(0))\n'
              '    assert re.search(r\'<h2>\\s*9\\. Carry, Treinamento e Progressão PvE</h2>\', pve.group(0))\n'
          )
          if 'Campo de Batalha, Formação e Posicionamento</h2>\', battlefield.group(0)' not in text:
              if validation_anchor not in text:
                  raise RuntimeError('Âncora de validação por seção não encontrada.')
              text = text.replace(validation_anchor, validation_patch, 1)

          path.write_text(text, encoding='utf-8')

          workflow = Path('.github/workflows/repair-battlefield-deploy.yml')
          workflow.unlink()
          PY

      - name: Commit permanent repair
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: repair battlefield numbering and validation"
          git push origin HEAD:main

      - name: Build consolidated GDD v16
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _site/gdd /tmp/gdd-build
          cat payload/*.txt \
            | tr -d '\n\r\t ' \
            | base64 --decode \
            | gzip --decompress \
            > /tmp/gdd-build/source.html

          python3 -m py_compile \
            scripts/build_gdd.py \
            scripts/patch_point5_gardener.py \
            scripts/patch_point6_battle.py \
            scripts/finalize_point6.py \
            scripts/patch_point7_farming.py \
            scripts/finalize_point7.py \
            scripts/patch_point8_pve.py \
            scripts/finalize_point8.py \
            scripts/patch_point8_battlefield.py \
            scripts/build_docs_portal.py

          python3 scripts/build_gdd.py /tmp/gdd-build/source.html _site/gdd/index.html
          python3 scripts/patch_point5_gardener.py _site/gdd/index.html
          python3 scripts/patch_point6_battle.py _site/gdd/index.html
          python3 scripts/finalize_point6.py _site/gdd/index.html
          python3 scripts/patch_point7_farming.py _site/gdd/index.html
          python3 scripts/finalize_point7.py _site/gdd/index.html
          python3 scripts/patch_point8_pve.py _site/gdd/index.html
          python3 scripts/finalize_point8.py _site/gdd/index.html
          python3 scripts/build_docs_portal.py _site _site/gdd/index.html
          python3 scripts/patch_point8_battlefield.py _site/gdd/index.html _site/index.html

          python3 - <<'PY'
          from pathlib import Path
          import html as html_lib
          import re

          gdd = Path('_site/gdd/index.html').read_text(encoding='utf-8')
          portal = Path('_site/index.html').read_text(encoding='utf-8')

          assert 'Game Design Document · v16' in gdd
          assert 'Available · v16' in portal
          assert 'Special Move' not in gdd and 'Special Moves' not in gdd
          assert gdd.count('<section id="battlefield-formation">') == 1
          assert gdd.count('<section id="pve-training">') == 1

          headings = []
          for match in re.finditer(r'<section\b[^>]*>(?P<body>.*?)</section>', gdd, re.I | re.S):
              h2 = re.search(r'<h2\b[^>]*>(?P<body>.*?)</h2>', match.group('body'), re.I | re.S)
              if not h2:
                  continue
              visible = re.sub(r'<[^>]+>', ' ', h2.group('body'))
              visible = ' '.join(html_lib.unescape(visible).split())
              number = re.match(r'(\d+)\.', visible)
              if number:
                  headings.append((int(number.group(1)), visible))

          numbers = [number for number, _ in headings]
          assert len(numbers) == len(set(numbers)), f'Numeração duplicada nos pontos: {headings}'
          assert any(title == '8. Campo de Batalha, Formação e Posicionamento' for _, title in headings)
          assert any(title == '9. Carry, Treinamento e Progressão PvE' for _, title in headings)
          print('Validated top-level headings:', headings)
          PY

          test -s _site/gdd/index.html
          test -s _site/index.html
          touch _site/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
