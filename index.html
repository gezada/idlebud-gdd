<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="color-scheme" content="dark">
<title>Idle Bud — Game Design Document</title>
<style>
html,body{margin:0;min-height:100%;background:#07100b;color:#edf7f0;font-family:Inter,system-ui,sans-serif}
body{display:grid;place-items:center}
main{text-align:center;padding:24px;max-width:720px}
p{opacity:.75}
.error{color:#ffb4b8;opacity:1}
button{margin-top:12px;padding:10px 16px;border:1px solid #42664f;border-radius:10px;background:#102719;color:#edf7f0;cursor:pointer}
small{display:block;margin-top:10px;opacity:.55;word-break:break-word}
</style>
</head>
<body>
<main>
  <strong>Idle Bud</strong>
  <p id="status">Carregando o Game Design Document…</p>
</main>
<script>
(async()=>{
  const version='v8-b6dd033c';
  const files=[
    'payload-v8/01.txt','payload-v8/02.txt','payload-v8/03.txt',
    'payload-v8/04.txt','payload-v8/05.txt','payload-v8/06.txt',
    'payload-v8/07.txt','payload-v8/08.txt','payload-v8/09.txt',
    'payload-v8/10.txt','payload-v8/11.txt'
  ];
  const status=document.getElementById('status');
  const sleep=ms=>new Promise(resolve=>setTimeout(resolve,ms));

  async function fetchWithRetry(url,attempts=3){
    let lastError;
    for(let attempt=1;attempt<=attempts;attempt++){
      try{
        const response=await fetch(url,{cache:'no-store'});
        if(!response.ok) throw new Error(`HTTP ${response.status}`);
        return await response.text();
      }catch(error){
        lastError=error;
        if(attempt<attempts) await sleep(350*attempt);
      }
    }
    throw lastError;
  }

  async function loadPart(file,index){
    status.textContent=`Carregando documento… ${index+1}/${files.length}`;
    const localUrl=new URL(`${file}?v=${version}`,document.baseURI).href;
    try{
      return await fetchWithRetry(localUrl);
    }catch(localError){
      const rawUrl=`https://raw.githubusercontent.com/gezada/idlebud-gdd/main/${file}?v=${version}`;
      try{
        return await fetchWithRetry(rawUrl);
      }catch(rawError){
        throw new Error(`Falha ao carregar ${file}. Local: ${localError.message}. Fallback: ${rawError.message}`);
      }
    }
  }

  const parts=[];
  for(let index=0;index<files.length;index++) parts.push(await loadPart(files[index],index));

  if(typeof DecompressionStream==='undefined'){
    throw new Error('Este navegador não oferece suporte à descompactação necessária. Atualize o navegador e tente novamente.');
  }

  status.textContent='Abrindo documento…';
  const base64=parts.join('').replace(/\s+/g,'');
  const bytes=Uint8Array.from(atob(base64),character=>character.charCodeAt(0));
  const stream=new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
  const html=await new Response(stream).text();
  document.open();
  document.write(html);
  document.close();
})().catch(error=>{
  const main=document.querySelector('main');
  main.innerHTML='<strong>Idle Bud</strong><p class="error">Não foi possível carregar o documento.</p><button type="button" id="retry">Tentar novamente</button><small></small>';
  main.querySelector('small').textContent=error?.message||String(error);
  main.querySelector('#retry').addEventListener('click',()=>window.location.reload());
  console.error(error);
});
</script>
</body>
</html>
